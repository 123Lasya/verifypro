<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - VerifyPro</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--background-dark);
            position: relative;
        }

        .back-link {
            position: absolute;
            top: 40px;
            left: 40px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .back-link:hover {
            color: white;
        }

        .auth-card {
            background-color: var(--background-card);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: var(--shadow-xl);
            text-align: center;
        }

        .logo-box {
            width: 48px;
            height: 48px;
            background-color: var(--primary-color);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            color: white;
        }

        .tab-group {
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 4px;
            border-radius: 12px;
            display: flex;
            margin: 32px 0;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-muted);
            background: transparent;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .tab-btn.active {
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .input {
            width: 100%;
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px 16px;
            color: white;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            font-size: 0.85rem;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            cursor: pointer;
        }

        .text-link {
            color: var(--primary-color);
            font-weight: 500;
        }

        .demo-credentials {
            background-color: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 16px;
            margin-top: 24px;
            text-align: left;
        }

        .demo-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .demo-row:last-child {
            margin-bottom: 0;
        }

        .demo-val {
            color: rgba(255, 255, 255, 0.6);
        }
    </style>
</head>

<body>

    <a href="../index.html" class="back-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5" />
            <path d="M12 19l-7-7 7-7" />
        </svg>
        Back to Home
    </a>

    <div class="auth-card">
        <div class="logo-box">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
            </svg>
        </div>
        <h1 class="font-bold text-white text-2xl mb-2">Welcome Back</h1>
        <p class="text-muted text-sm">Sign in to your VerifyPro account</p>

        <!-- Role Tabs -->
        <div class="tab-group">
            <button class="tab-btn active" onclick="switchTab('hr')">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                    <circle cx="12" cy="7" r="4" />
                </svg>
                HR Portal
            </button>
            <button class="tab-btn" onclick="switchTab('candidate')">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                    <polyline points="14 2 14 8 20 8" />
                    <line x1="16" y1="13" x2="8" y2="13" />
                    <line x1="16" y1="17" x2="8" y2="17" />
                    <polyline points="10 9 9 9 8 9" />
                </svg>
                Candidate Portal
            </button>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label class="label" id="emailLabel">Organization Email Address</label>
                <input type="email" id="emailInput" class="input" placeholder="Enter your email" required
                    value="hr@company.com">
            </div>

            <div class="form-group">
                <label class="label">Password</label>
                <input type="password" class="input" placeholder="Enter your password" required value="password">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px;" id="submitBtn">
                Sign In to HR Portal
            </button>
        </form>

        <div class="demo-credentials">
            <div class="font-semibold text-xs text-white mb-2">Demo Credentials:</div>
            <div class="demo-row">
                <span>HR Portal:</span>
                <span class="demo-val">hr@company.com / password</span>
            </div>
            <div class="demo-row">
                <span>Candidate Portal:</span>
                <span class="demo-val">user@email.com / password</span>
            </div>
        </div>
    </div>

    <script type="module">
        import { MockDB } from '../js/mock-db.js';

        let currentRole = 'hr';

        window.switchTab = (role) => {
            currentRole = role;
            const btns = document.querySelectorAll('.tab-btn');
            btns.forEach(btn => btn.classList.remove('active'));

            const emailLabel = document.getElementById('emailLabel');
            const submitBtn = document.getElementById('submitBtn');
            const emailInput = document.getElementById('emailInput');

            if (role === 'hr') {
                btns[0].classList.add('active');
                emailLabel.textContent = 'Organization Email Address';
                submitBtn.textContent = 'Sign In to HR Portal';
                emailInput.value = 'hr@company.com';
            } else {
                btns[1].classList.add('active');
                emailLabel.textContent = 'Email Address';
                submitBtn.textContent = 'Sign In to Candidate Portal';
                emailInput.value = 'user@email.com';
            }
        };

        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.textContent = 'Signing in...';
            btn.disabled = true;

            const email = document.getElementById('emailInput').value;

            // Mock DB Log in
            MockDB.login(email, currentRole);

            setTimeout(() => {
                if (currentRole === 'candidate') {
                    window.location.href = 'candidate-dashboard.html';
                } else {
                    window.location.href = 'hr-dashboard.html';
                }
            }, 800);
        };
    </script>
</body>

</html>
